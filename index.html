<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConceptDynamics - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .bio {
            color: #555;
            margin: 30px 0;
            line-height: 1.8;
            font-size: 1.05em;
        }
        
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        
        .links a {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: 500;
        }
        
        .links a:hover {
            background: #764ba2;
        }
        
        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ConceptDynamics</h1>
        <p class="subtitle">Welcome to My Digital Space</p>
        
        <p class="bio">
            Hi! I'm ConceptDynamics. This is my personal GitHub Pages site where I share my projects, ideas, and work.
            Feel free to explore and connect with me.
        </p>
        
        <div class="links">
            <a href="https://github.com/ConceptDynamics" target="_blank">GitHub Profile</a>
            <a href="mailto:your-email@example.com">Contact Me</a>
        </div>
        
        <div class="footer">
            <p>Built with GitHub Pages | Last updated 2026</p>
        </div>
    </div>
</body>
</html>
